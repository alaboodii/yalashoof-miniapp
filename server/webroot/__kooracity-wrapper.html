<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1f">
<title>كورة سيتي — Trab TV</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  (function () {
    var tg = window.Telegram && window.Telegram.WebApp;
    if (!tg) return;
    try { tg.ready(); } catch (_) {}
    try { tg.expand(); } catch (_) {}
    try { tg.disableVerticalSwipes && tg.disableVerticalSwipes(); } catch (_) {}
    try { tg.requestFullscreen && tg.requestFullscreen(); } catch (_) {}
    try { tg.setHeaderColor && tg.setHeaderColor('#0a0f1f'); } catch (_) {}
    try { tg.setBackgroundColor && tg.setBackgroundColor('#0a0f1f'); } catch (_) {}
  })();
</script>
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0a0f1f;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .frame-host {
    position: fixed;
    inset: 0;
    background: #0a0f1f;
  }
  iframe {
    display: block;
    width: 100%;
    height: 100%;
    border: 0;
    background: #0a0f1f;
  }
  /* Loading state */
  .loader {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #14142b 0%, #0a0f1f 70%);
    z-index: 1;
    font-family: 'Tajawal', system-ui, sans-serif;
    color: #94a3b8;
    font-size: 13px;
    letter-spacing: 1px;
    transition: opacity 0.4s;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(6,214,160,0.15);
    border-top-color: #06d6a0;
    border-radius: 50%;
    margin: 0 auto 14px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { text-align: center; }
</style>
</head>
<body>
<div class="frame-host">
  <div class="loader" id="loader">
    <div class="loader-text">
      <div class="spinner"></div>
      <div>جاري تحميل المصدر الثاني...</div>
    </div>
  </div>
  <iframe id="src-frame"
          src="https://koooracity.tv/"
          allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
          referrerpolicy="no-referrer-when-downgrade"
          sandbox="allow-same-origin allow-scripts allow-forms allow-presentation allow-modals"
          loading="eager"></iframe>
</div>
<script>
  // Hide loader when iframe finishes loading
  var fr = document.getElementById('src-frame');
  var ld = document.getElementById('loader');
  function hide() { try { ld.classList.add('hidden'); } catch (_) {} }
  fr.addEventListener('load', hide, { once: true });
  // Failsafe: hide after 6s even if load event never fires (cross-origin)
  setTimeout(hide, 6000);
</script>
</body>
</html>
