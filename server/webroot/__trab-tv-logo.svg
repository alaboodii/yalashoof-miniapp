<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 640 200"
     preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="Trab TV">
  <defs>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E63946"/>
      <stop offset="50%"  stop-color="#E76F51"/>
      <stop offset="100%" stop-color="#FFB627"/>
    </linearGradient>
    <linearGradient id="met" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFF6E0"/>
      <stop offset="35%"  stop-color="#FFC579"/>
      <stop offset="70%"  stop-color="#E76F51"/>
      <stop offset="100%" stop-color="#7c1d28"/>
    </linearGradient>
    <filter id="ds" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.30"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Wordmark -->
  <g font-family="'Arial Black', 'Helvetica Neue', Helvetica, Impact, sans-serif"
     font-weight="900"
     font-size="124"
     letter-spacing="2"
     filter="url(#ds)">
    <text x="40"  y="138" fill="url(#met)">Trab</text>
    <text x="392" y="138" fill="url(#sun)">TV</text>
  </g>

  <!-- Play-button separator (TV signal) -->
  <g filter="url(#ds)">
    <circle cx="350" cy="100" r="32" fill="none" stroke="url(#sun)" stroke-width="6"/>
    <polygon points="341,82 341,118 372,100" fill="url(#sun)"/>
  </g>
</svg>
