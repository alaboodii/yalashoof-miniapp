# == TRAB DEV showcase + sources ==
# / = static showcase page
# /s/majed/      = reverse-proxy to www.majed-koora.live (Source 1: ماجد سبورت) — stream via pscp.tv direct
# /s/livescore/  = reverse-proxy to www.mobilkoora.com   (Source 2: كورة لايف) — rotates often
# /s/syrlive/    = reverse-proxy to d.syrlive.com       (Source 3: سوريا لايف) — stream via S3 direct
# /s/kooracity/, /s/koora4live/ = retired/broken (no portal card); blocks kept inert
# /__ext/ and /__ext2/ = generic external proxy for cross-origin assets/streams

upstream syrlive_upstream {
    server d.syrlive.com:443;
    keepalive 64;
    keepalive_requests 10000;
    keepalive_timeout 300s;
}

upstream livescore_upstream {
    # كورة لايف rotates its live domain often (live-score.top -> freekora.com ->
    # freekoora4you.com -> mobilkoora.com ...). Point straight at the CURRENT final
    # domain so the 301 chain never reaches the client. Re-point when it rotates.
    # 2026-06-23: now www.mobilkoora.com
    server www.mobilkoora.com:443;
    keepalive 64;
    keepalive_requests 10000;
    keepalive_timeout 300s;
}

upstream koora4live_upstream {
    # koora4live-new.best 301-chains (7 hops) to its current live domain; point straight at it.
    # Re-point when this domain rotates.
    server gonutradeal.com:443;
    keepalive 64;
    keepalive_requests 10000;
    keepalive_timeout 300s;
}

upstream majed_upstream {
    # ماجد سبورت — LiteSpeed (not Cloudflare), framable, clean. Live stream is served
    # by *.video.pscp.tv (Periscope/Fastly) whose token is minted for the USER's IP and
    # whose CORS reflects our origin — so the stream loads DIRECT, never through the proxy.
    server www.majed-koora.live:443;
    keepalive 64;
    keepalive_requests 10000;
    keepalive_timeout 300s;
}


server {
    listen 80;
    listen [::]:80;
    server_name yala.zaboni.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yala.zaboni.store;

    ssl_certificate /etc/letsencrypt/live/yala.zaboni.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yala.zaboni.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # ===== Performance tuning =====
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # gzip everything text-y
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript text/xml application/json application/javascript application/xml application/xml+rss application/rss+xml application/atom+xml image/svg+xml application/vnd.api+json application/x-mpegurl application/vnd.apple.mpegurl;

    # Larger proxy buffers for video chunks
    proxy_buffer_size 64k;
    proxy_buffers 32 64k;
    proxy_busy_buffers_size 128k;
    proxy_max_temp_file_size 0;
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Tighten upstream timeouts so a slow segment doesn't block everything
    proxy_connect_timeout 8s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;
    send_timeout 30s;

    root /var/www/yala.zaboni.store;

    # =========================================================
    # 1) STATIC SHOWCASE (homepage)
    # =========================================================
    location = / {
        try_files /showcase.html =404;
        # Portal HTML must always be fresh — never cache at Cloudflare or in the browser,
        # so portal edits (cards, fixes) take effect immediately without a manual purge.
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
    }

    location = /__alaboodi-logo.svg {
        alias /var/www/yala.zaboni.store/__alaboodi-logo.svg;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location = /__trab-tv-logo.svg {
        alias /var/www/yala.zaboni.store/__trab-tv-logo.svg;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Long-cache any static asset by extension
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|woff2?|ttf|otf|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # =========================================================
    # 2) SOURCE 1: سوريا لايف (d.syrlive.com) under /s/syrlive/
    # =========================================================
    location ^~ /s/syrlive/ {
        rewrite ^/s/syrlive/?(.*)$ /$1 break;

        proxy_pass https://syrlive_upstream;
        proxy_set_header Host d.syrlive.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Referer "https://d.syrlive.com/";
        proxy_set_header Accept-Encoding "";
        # Force desktop UA so upstream never 302-redirects mobile users to m.syrlive.com
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/130.0.0.0 Safari/537.36";
        proxy_set_header Cookie "device_redirected=desktop";
        proxy_ssl_server_name on;
        proxy_ssl_name d.syrlive.com;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;

        proxy_redirect https://d.syrlive.com/ https://yala.zaboni.store/s/syrlive/;
        proxy_cookie_domain d.syrlive.com yala.zaboni.store;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        # Never let Cloudflare/browser cache proxied source pages (live match data):
        # strip the upstream's Cache-Control/Expires and force no-store.
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        proxy_hide_header Pragma;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;

        sub_filter_types text/html text/css text/javascript application/javascript application/json;
        sub_filter_once off;

        # Init the page as a Telegram Mini App page when opened in-container.
        sub_filter "<head>" "<head><script>(function(){var s=document.createElement('script');s.src='https://telegram.org/js/telegram-web-app.js';s.onload=function(){try{var t=window.Telegram&&window.Telegram.WebApp;if(!t)return;try{t.ready();}catch(e){}try{t.expand();}catch(e){}try{t.disableVerticalSwipes&&t.disableVerticalSwipes();}catch(e){}try{if(t.BackButton){t.BackButton.show();t.BackButton.onClick(function(){history.back();});}}catch(e){}}catch(e){}};(document.head||document.documentElement).appendChild(s);})();</script>";
        sub_filter "https://d.syrlive.com" "https://yala.zaboni.store/s/syrlive";
        sub_filter "//d.syrlive.com"       "//yala.zaboni.store/s/syrlive";
        sub_filter "https://www.syrlive.com" "https://yala.zaboni.store/s/syrlive";
        sub_filter "//www.syrlive.com"       "//yala.zaboni.store/s/syrlive";

        sub_filter ' href="/'   ' href="/s/syrlive/';
        sub_filter " href='/"   " href='/s/syrlive/";
        sub_filter ' src="/'    ' src="/s/syrlive/';
        sub_filter " src='/"    " src='/s/syrlive/";
        sub_filter ' action="/' ' action="/s/syrlive/';
        sub_filter ' content="/'  ' content="/s/syrlive/';

        # ===== SYRLIVE-only ad/popup nuke =====
        # Block Google AdSense network so popup ads (WPS Office etc.) never load.
        sub_filter "https://pagead2.googlesyndication.com" "https://blocked.invalid";
        sub_filter "//pagead2.googlesyndication.com"        "//blocked.invalid";
        sub_filter "https://googlesyndication.com"   "https://blocked.invalid";
        sub_filter "https://googleadservices.com"    "https://blocked.invalid";
        sub_filter "https://doubleclick.net"         "https://blocked.invalid";
        sub_filter "https://adservice.google.com"    "https://blocked.invalid";
        sub_filter "https://googletagservices.com"   "https://blocked.invalid";
        sub_filter "https://googletagmanager.com"    "https://blocked.invalid";

        sub_filter "</head>" "<style>#sylive-banner,.MobAppBanner,.MobApp,.smart-app-banner,#smartbanner,#download-app,.app-popup,ins.adsbygoogle,[class*='adsbygoogle'],[id^='google_ads'],[id*='ads-'],iframe[src*='doubleclick'],iframe[src*='googlesyndication'],iframe[src*='googleadservices'],iframe[src*='popunder'],iframe[src*='popcash'],iframe[src*='propeller'],iframe[src*='exoclick'],iframe[src*='ad-tag'],div[class*='ad-banner'],div[id*='ad-banner'],div[class*='ad-container'],div[id*='ad-container'],div[class*='ad-overlay']{display:none!important;visibility:hidden!important;height:0!important;width:0!important;overflow:hidden!important;pointer-events:none!important;opacity:0!important;position:absolute!important;left:-9999px!important}</style><script>(function(){var SELS=['ins.adsbygoogle','[class*=\"adsbygoogle\"]','[id^=\"google_ads\"]','iframe[src*=\"doubleclick\"]','iframe[src*=\"googlesyndication\"]','iframe[src*=\"googleadservices\"]','iframe[src*=\"popunder\"]','iframe[src*=\"popcash\"]','iframe[src*=\"propeller\"]','iframe[src*=\"exoclick\"]','iframe[src=\"about:blank\"]','#sylive-banner','.MobAppBanner','.app-popup'];function nuke(){try{SELS.forEach(function(s){document.querySelectorAll(s).forEach(function(el){try{el.remove();}catch(_){}});});}catch(_){}}nuke();document.addEventListener('DOMContentLoaded',nuke);try{var mo=new MutationObserver(nuke);mo.observe(document.documentElement,{childList:true,subtree:true});}catch(_){}window.open=function(){return null;};document.addEventListener('click',function(e){try{var a=e.target.closest&&e.target.closest('a[target=_blank]');if(a)a.removeAttribute('target');}catch(_){}},true);})();</script></head>";
    }

    # =========================================================
    # 2-bis) SOURCE 2: Koora City (koooracity.io) — IFRAME WRAPPER
    #   * Server-side proxy is BLOCKED by Cloudflare bot challenge (datacenter IP)
    #   * We serve a static HTML wrapper that loads the site in an iframe in the
    #     USER'S browser (residential IP → CF accepts).
    # =========================================================
    location = /s/kooracity/ {
        root /var/www/yala.zaboni.store;
        try_files /__kooracity-wrapper.html =404;
        default_type text/html;
        add_header Cache-Control "no-store, must-revalidate" always;
    }
    location = /s/kooracity {
        return 301 /s/kooracity/;
    }

