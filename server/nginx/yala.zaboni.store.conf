        sub_filter " src='/"    " src='/s/koora4live/";
        sub_filter ' action="/' ' action="/s/koora4live/';
        sub_filter ' content="/'  ' content="/s/koora4live/';
    }

    # =========================================================
    # SOURCE 1: ماجد سبورت (www.majed-koora.live) under /s/majed/
    #   * Clean LiteSpeed site, framable, no popunder.
    #   * Live stream = *.video.pscp.tv (Periscope/Fastly): token is IP-bound to the
    #     user + CORS reflects our origin, so it MUST load direct. Do NOT add a
    #     sub_filter that rewrites pscp.tv (proxying it returns 403).
    # =========================================================
    location ^~ /s/majed/ {
        rewrite ^/s/majed/?(.*)$ /$1 break;

        proxy_pass https://majed_upstream;
        proxy_set_header Host www.majed-koora.live;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Referer "https://www.majed-koora.live/";
        proxy_set_header Accept-Encoding "";
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/130.0.0.0 Safari/537.36";
        proxy_ssl_server_name on;
        proxy_ssl_name www.majed-koora.live;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;

        proxy_redirect https://www.majed-koora.live/ https://yala.zaboni.store/s/majed/;
        proxy_redirect https://majed-koora.live/     https://yala.zaboni.store/s/majed/;
        proxy_cookie_domain www.majed-koora.live yala.zaboni.store;
        proxy_cookie_domain .majed-koora.live    yala.zaboni.store;
        proxy_cookie_domain majed-koora.live     yala.zaboni.store;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        # Never let Cloudflare/browser cache proxied source pages (live match data):
        # strip the upstream's Cache-Control/Expires and force no-store.
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        proxy_hide_header Pragma;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;

        sub_filter_types text/html text/css text/javascript application/javascript application/json;
        sub_filter_once off;

        # Init the page as a Telegram Mini App page when opened in-container
        # (loads the SDK, calls ready()/expand(), shows a Back button to the portal).
        # Prevents the freeze/blank that happens when a source page never calls ready().
        sub_filter "<head>" "<head><script>(function(){var s=document.createElement('script');s.src='https://telegram.org/js/telegram-web-app.js';s.onload=function(){try{var t=window.Telegram&&window.Telegram.WebApp;if(!t)return;try{t.ready();}catch(e){}try{t.expand();}catch(e){}try{t.disableVerticalSwipes&&t.disableVerticalSwipes();}catch(e){}try{if(t.BackButton){t.BackButton.show();t.BackButton.onClick(function(){history.back();});}}catch(e){}}catch(e){}};(document.head||document.documentElement).appendChild(s);})();</script>";
        sub_filter "https://www.majed-koora.live" "https://yala.zaboni.store/s/majed";
        sub_filter "//www.majed-koora.live"        "//yala.zaboni.store/s/majed";
        sub_filter "https://majed-koora.live"     "https://yala.zaboni.store/s/majed";
        sub_filter "//majed-koora.live"            "//yala.zaboni.store/s/majed";

        # protocol-relative -> absolute https BEFORE the root-relative rewrite
        sub_filter ' src="//'    ' src="https://';
        sub_filter " src='//"    " src='https://";
        sub_filter ' href="//'   ' href="https://';
        sub_filter " href='//"   " href='https://";

        # root-relative -> /s/majed/
        sub_filter ' href="/'   ' href="/s/majed/';
        sub_filter " href='/"   " href='/s/majed/";
        sub_filter ' src="/'    ' src="/s/majed/';
        sub_filter " src='/"    " src='/s/majed/";
        sub_filter ' action="/' ' action="/s/majed/';
        sub_filter ' content="/'  ' content="/s/majed/';

        # keep the quality links in-app: strip _blank so the stream opens in the same view
        sub_filter 'target="_blank"' 'target="_self"';
        sub_filter "target='_blank'" "target='_self'";
    }

    # =========================================================
    # 3) Generic external host proxy.
    #    Keeps inner iframes inside yala.zaboni.store so Telegram WebView
    #    does not break on cross-origin player iframes.
    # =========================================================
    location ~ "^/__ext2?/([a-zA-Z0-9][-a-zA-Z0-9.]{0,253}\.[a-zA-Z]{2,24})(/.*)?$" {
        set $ext_host $1;
        set $ext_path $2;
        if ($ext_path = "") { set $ext_path "/"; }

        proxy_set_header Host $ext_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Referer "https://$ext_host$ext_path";
        proxy_set_header User-Agent "Mozilla/5.0";
        proxy_set_header Accept-Encoding "";

        proxy_pass https://$ext_host$ext_path$is_args$args;
        proxy_ssl_server_name on;
        proxy_ssl_name $ext_host;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        # Never let Cloudflare/browser cache proxied source pages (live match data):
        # strip the upstream's Cache-Control/Expires and force no-store.
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        proxy_hide_header Pragma;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        proxy_redirect ~^https?://([^/]+)(/.*)?$ /__ext2/$1$2;
        proxy_cookie_domain ~^.*$ yala.zaboni.store;

        # ===== NO proxy_cache for /__ext2/ — live HLS streams must NEVER be cached =====
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        sub_filter_types text/html text/css text/javascript application/javascript application/json;
        sub_filter_once off;

        # Keep the player iframe chain inside our proxy (livescore.top stream chain)
        sub_filter "https://zz.gwoo.online"   "https://yala.zaboni.store/__ext2/zz.gwoo.online";
        sub_filter "//zz.gwoo.online"          "//yala.zaboni.store/__ext2/zz.gwoo.online";
        sub_filter "https://zzz.gwoo.online"  "https://yala.zaboni.store/__ext2/zzz.gwoo.online";
        sub_filter "//zzz.gwoo.online"         "//yala.zaboni.store/__ext2/zzz.gwoo.online";
        sub_filter "https://zzzz.gwoo.online" "https://yala.zaboni.store/__ext2/zzzz.gwoo.online";
        sub_filter "//zzzz.gwoo.online"        "//yala.zaboni.store/__ext2/zzzz.gwoo.online";
        # NOTE: do NOT proxy kooraextra.com or zliymordanex.sbs.
        # The Radiant Media Player has a domain-locked license + iframeAllowed=false guard
        # that fail when proxied. Letting the chain navigate externally keeps the player
        # working. We use Telegram.WebApp.openLink (added to the gokora redirect below)
        # so the broadcast opens in Telegram's in-app browser (which handles HLS without
        # the WebView 10-second suspension).

        # NOTE: do NOT proxy zliymordanex.sbs (the actual stream-player host).
        # Radiant Media Player has a domain-locked license + iframeAllowed=false guard
        # that fail when proxied through any other domain.
        # syrlive.com stream chain (player.syria-player.live)
        sub_filter "https://player.syria-player.live" "https://yala.zaboni.store/__ext2/player.syria-player.live";
        sub_filter "//player.syria-player.live"        "//yala.zaboni.store/__ext2/player.syria-player.live";

        # Rewrite ROOT-RELATIVE URLs in proxied content back to the SAME upstream
        # so "/p2p-engines.min.js" on the player page → /__ext2/<host>/p2p-engines.min.js
        # (otherwise hits our root → 404 and HLS engine never starts → broadcast won't play).
        sub_filter ' src="/'    ' src="/__ext2/$ext_host/';
        sub_filter " src='/"    " src='/__ext2/$ext_host/";
        sub_filter ' href="/'   ' href="/__ext2/$ext_host/';
        sub_filter " href='/"   " href='/__ext2/$ext_host/";
        sub_filter ' action="/' ' action="/__ext2/$ext_host/';
        sub_filter ' content="/'  ' content="/__ext2/$ext_host/';
    }
}
