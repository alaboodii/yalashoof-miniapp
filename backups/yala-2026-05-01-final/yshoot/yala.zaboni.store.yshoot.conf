upstream yshoot_upstream {
    server www.yshootlive.com:443;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

server {
    listen 80;
    listen [::]:80;
    server_name yala.zaboni.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yala.zaboni.store;

    ssl_certificate /etc/letsencrypt/live/yala.zaboni.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yala.zaboni.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/html text/css text/plain text/xml text/javascript
        application/javascript application/x-javascript application/json
        application/xml application/rss+xml application/atom+xml
        image/svg+xml font/ttf font/otf;

    if ($is_bad_bot = 1) { return 403; }

    location ~ /\.(env|git|svn|hg|bzr|htaccess|htpasswd|DS_Store) { deny all; return 404; }
    location ~ /(wp-admin|wp-login|xmlrpc\.php|phpmyadmin|adminer)(/|$) { return 403; }
    location ~* \.(bak|backup|old|orig|sql|swp|swo|tmp|conf|config|log|ini|env)$ { deny all; return 404; }

    proxy_buffer_size 32k;
    proxy_buffers 32 32k;
    proxy_busy_buffers_size 128k;
    proxy_max_temp_file_size 0;
    client_max_body_size 50M;
    client_body_buffer_size 64k;

    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    limit_conn yala_conn 50;

    location ~* ^(?!/__ext2/).*\.(jpg|jpeg|png|gif|svg|webp|ico|woff|woff2|ttf|otf|eot)$ {
        proxy_pass https://yshoot_upstream;
        proxy_set_header Host www.yshootlive.com;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;
        proxy_ssl_name www.yshootlive.com;
        proxy_ssl_verify off;

        proxy_cache yala_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status always;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        limit_req zone=yala_rl burst=120 nodelay;

        proxy_pass https://yshoot_upstream;
        proxy_set_header Host www.yshootlive.com;
        proxy_set_header X-Real-IP $remote_addr;
