server {
    listen 80;
    listen [::]:80;
    server_name yala.zaboni.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yala.zaboni.store;

    ssl_certificate /etc/letsencrypt/live/yala.zaboni.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yala.zaboni.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    if ($is_bad_bot = 1) { return 403; }

    location ~ /\.(env|git|svn|hg|bzr|htaccess|htpasswd|DS_Store) { deny all; return 404; }
    location ~ /(wp-admin|wp-login|xmlrpc\.php|phpmyadmin|adminer)(/|$) { return 403; }
    location ~* \.(bak|backup|old|orig|sql|swp|swo|tmp|conf|config|log|ini|env)$ { deny all; return 404; }

    proxy_buffer_size 32k;
    proxy_buffers 16 32k;
    proxy_busy_buffers_size 64k;
    client_max_body_size 50M;

    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    limit_conn yala_conn 30;

    location / {
        limit_req zone=yala_rl burst=60 nodelay;

        set $upstream "www.yalashoof.com";

        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $upstream;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Referer "https://$upstream/";

        proxy_pass https://$upstream;
        proxy_ssl_server_name on;
        proxy_ssl_name $upstream;
        proxy_ssl_verify off;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        proxy_redirect https://www.yalashoof.com/ https://yala.zaboni.store/;
        proxy_redirect https://yalashoof.com/ https://yala.zaboni.store/;
        proxy_redirect http://www.yalashoof.com/ https://yala.zaboni.store/;
        proxy_redirect http://yalashoof.com/ https://yala.zaboni.store/;

        proxy_cookie_domain www.yalashoof.com yala.zaboni.store;
        proxy_cookie_domain .www.yalashoof.com .yala.zaboni.store;
        proxy_cookie_domain yalashoof.com yala.zaboni.store;
        proxy_cookie_domain .yalashoof.com .yala.zaboni.store;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;
        proxy_hide_header X-Server-Powered-By;
        proxy_hide_header X-Powered-By;

        sub_filter_types text/html text/css text/plain text/xml application/javascript application/x-javascript application/json application/rss+xml application/atom+xml application/xml;
        sub_filter_once off;

        # URL rewrites (proxy)
        sub_filter "https://www.yalashoof.com" "https://yala.zaboni.store";
        sub_filter "https://yalashoof.com"     "https://yala.zaboni.store";
        sub_filter "//www.yalashoof.com"       "//yala.zaboni.store";
        sub_filter "//yalashoof.com"           "//yala.zaboni.store";

        # Time zone label
        sub_filter "بتوقيت الرياض" "بتوقيت محافظة ميسان العضيمة";

        # Brand rename — ALL variants and casings (longer phrases FIRST)
        sub_filter "Yalla Shoot Live" "Alaboodi TV";
        sub_filter "yalla shoot live" "Alaboodi TV";
        sub_filter "YALLA SHOOT LIVE" "Alaboodi TV";
        sub_filter "Yalla shoot live" "Alaboodi TV";
        sub_filter "Yalla Shoot"      "Alaboodi TV";
        sub_filter "yalla shoot"      "Alaboodi TV";
        sub_filter "YALLA SHOOT"      "Alaboodi TV";
        sub_filter "Yalla shoot"      "Alaboodi TV";
        sub_filter "yallashoot live"  "alaboodi-tv";
        sub_filter "Yallashoot Live"  "Alaboodi TV";
        sub_filter "yallashoot"       "alaboodi-tv";
        sub_filter "Yallashoot"       "Alaboodi TV";
        sub_filter "YALLASHOOT"       "ALABOODI TV";
        sub_filter "يلا شوت لايف"   "العبودي تي في";
        sub_filter "يلا شوت"        "العبودي تي في";
        sub_filter "يلاشوت"         "العبودي تي في";

        # Inject styling + dark-mode default + custom font in <head>
        sub_filter "<head>" "<head><link rel=preconnect href=https://fonts.googleapis.com><link rel=stylesheet href=https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap><script>try{var m=localStorage.getItem('mode');if(!m){localStorage.setItem('mode','rdmode');m='rdmode'}if(m==='rdmode')document.documentElement.classList.add('Night')}catch(e){}</script><style>a.aya-btn,a.aya-btn:hover,a.aya-btn:focus,a.aya-btn:active,a.aya-btn.active{transition:none!important;-webkit-tap-highlight-color:transparent!important}a.aya-btn[title*='الأمس'],a.aya-btn[title*='الأمس']:hover,a.aya-btn[title*='الأمس']:focus,a.aya-btn[title*='الأمس']:active{background:#0d9488!important;background-color:#0d9488!important;--btn-bg:#0d9488!important}a.aya-btn[title*='اليوم'],a.aya-btn[title*='اليوم']:hover,a.aya-btn[title*='اليوم']:focus,a.aya-btn[title*='اليوم']:active{background:#dc2626!important;background-color:#dc2626!important;--btn-bg:#dc2626!important}a.aya-btn[title*='الغد'],a.aya-btn[title*='الغد']:hover,a.aya-btn[title*='الغد']:focus,a.aya-btn[title*='الغد']:active{background:#7c3aed!important;background-color:#7c3aed!important;--btn-bg:#7c3aed!important}#AYaLogo,#AYaLogo *{background:transparent!important}#AYaLogo a,#AYaLogo a *{font-size:0!important;line-height:0!important;color:transparent!important}#AYaLogo a{background:#b91c1c!important;padding:5px 14px!important;border-radius:6px!important;display:inline-block!important;text-decoration:none!important}#AYaLogo a::before{content:'Alaboodi TV';font-family:'Bebas Neue','Oswald','Impact',sans-serif;font-size:22px;font-weight:400;color:#fff;letter-spacing:1.5px;line-height:1.2;display:inline-block;direction:ltr}#AYaFooter > *:not(#__yala_credit){display:none!important}.AY_Block.PS_1{display:none!important}#AYaFooter{padding:18px 12px!important;text-align:center!important;background:#1a1a1a!important;color:#fff!important}</style>";

        # Inject body-end script
        sub_filter "</body>" "<script src=\"/__yala_wrap.js\" defer></script></body>";
    }

    location = /__yala_wrap.js {
        alias /var/www/yala.zaboni.store/__yala_wrap.js;
        add_header Cache-Control "no-cache" always;
    }
}
