# == syrlive — clean baseline (d.syrlive.com) ==
# Plain reverse-proxy. No customizations. No sub_filter. No script injection.
# Place at: /etc/nginx/sites-available/yala.zaboni.store.syrlive
# Activate via: yala-switch syrlive

upstream syrlive_upstream {
    server d.syrlive.com:443;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name yala.zaboni.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yala.zaboni.store;

    ssl_certificate /etc/letsencrypt/live/yala.zaboni.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yala.zaboni.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    proxy_buffer_size 32k;
    proxy_buffers 16 32k;
    client_max_body_size 50M;

    location / {
        proxy_pass https://syrlive_upstream;
        proxy_set_header Host d.syrlive.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Referer "https://d.syrlive.com/";
        proxy_ssl_server_name on;
        proxy_ssl_name d.syrlive.com;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;

        proxy_redirect https://d.syrlive.com/ https://yala.zaboni.store/;
        proxy_cookie_domain d.syrlive.com yala.zaboni.store;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }

    # Generic external host proxy for cross-origin assets
    location ~ "^/__ext2?/([a-zA-Z0-9][-a-zA-Z0-9.]{0,253}\.[a-zA-Z]{2,24})(/.*)?$" {
        set $ext_host $1;
        set $ext_path $2;
        if ($ext_path = "") { set $ext_path "/"; }

        proxy_set_header Host $ext_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Referer "https://$ext_host$ext_path";
        proxy_set_header User-Agent "Mozilla/5.0";

        proxy_pass https://$ext_host$ext_path$is_args$args;
        proxy_ssl_server_name on;
        proxy_ssl_name $ext_host;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_redirect ~^https?://([^/]+)(/.*)?$ /__ext2/$1$2;
        proxy_cookie_domain ~^.*$ yala.zaboni.store;
    }
}
