upstream hesgoal_upstream {
    server hesgoal.football:443;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

server {
    listen 80;
    listen [::]:80;
    server_name yala.zaboni.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yala.zaboni.store;

    ssl_certificate /etc/letsencrypt/live/yala.zaboni.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yala.zaboni.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/html text/css text/plain text/xml text/javascript
        application/javascript application/x-javascript application/json
        application/xml application/rss+xml application/atom+xml
        image/svg+xml font/ttf font/otf;

    if ($is_bad_bot = 1) { return 403; }

    location ~ /\.(env|git|svn|hg|bzr|htaccess|htpasswd|DS_Store) { deny all; return 404; }
    location ~ /(wp-admin|wp-login|xmlrpc\.php|phpmyadmin|adminer)(/|$) { return 403; }
    location ~* \.(bak|backup|old|orig|sql|swp|swo|tmp|conf|config|log|ini|env)$ { deny all; return 404; }

    proxy_buffer_size 32k;
    proxy_buffers 32 32k;
    proxy_busy_buffers_size 128k;
    proxy_max_temp_file_size 0;
    client_max_body_size 50M;
    client_body_buffer_size 64k;

    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    limit_conn yala_conn 50;

    location ~* \.(jpg|jpeg|png|gif|svg|webp|ico|woff|woff2|ttf|otf|eot)$ {
        proxy_pass https://hesgoal_upstream;
        proxy_set_header Host hesgoal.football;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;
        proxy_ssl_name hesgoal.football;
        proxy_ssl_verify off;

        proxy_cache yala_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status always;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        limit_req zone=yala_rl burst=120 nodelay;

        proxy_pass https://hesgoal_upstream;
        proxy_set_header Host hesgoal.football;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Referer "https://hesgoal.football/";
        proxy_set_header Accept-Encoding "";

        proxy_ssl_server_name on;
        proxy_ssl_name hesgoal.football;
        proxy_ssl_verify off;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;

        proxy_cache yala_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 30s;
        proxy_cache_valid 301 302 1m;
        proxy_cache_valid 404 30s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        add_header X-Cache-Status $upstream_cache_status always;

        proxy_redirect https://hesgoal.football/ https://yala.zaboni.store/;
        proxy_redirect https://www.hesgoal.football/ https://yala.zaboni.store/;
        proxy_redirect http://hesgoal.football/  https://yala.zaboni.store/;

        proxy_cookie_domain hesgoal.football yala.zaboni.store;
        proxy_cookie_domain .hesgoal.football .yala.zaboni.store;
        proxy_cookie_domain www.hesgoal.football yala.zaboni.store;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;
        proxy_hide_header X-Server-Powered-By;
        proxy_hide_header X-Powered-By;

        sub_filter_types text/html text/css text/plain text/xml text/javascript application/javascript application/x-javascript application/json application/rss+xml application/atom+xml application/xml;
        sub_filter_once off;

        # === URL rewrites: hesgoal → our domain ===
        sub_filter "https://www.hesgoal.football" "https://yala.zaboni.store";
        sub_filter "https://hesgoal.football"     "https://yala.zaboni.store";
        sub_filter "//www.hesgoal.football"       "//yala.zaboni.store";
        sub_filter "//hesgoal.football"           "//yala.zaboni.store";

        # === Strip target=_blank so Telegram WebApp does not prompt ===
        sub_filter ' target="_blank"' '';
        sub_filter ' target=_blank' '';
        sub_filter " target='_blank'" '';

        # === Route external streaming hosts through /__ext/ ===
        sub_filter "https://xyzhesgoal-football.panel001.mov" "https://yala.zaboni.store/__ext/xyzhesgoal-football.panel001.mov";
        sub_filter "//xyzhesgoal-football.panel001.mov"       "//yala.zaboni.store/__ext/xyzhesgoal-football.panel001.mov";
        sub_filter "https://hesgoal-football.panel001.mov"    "https://yala.zaboni.store/__ext/hesgoal-football.panel001.mov";
        sub_filter "https://ws.kora-api.spac"     "https://yala.zaboni.store/__ext/ws.kora-api.spac";
        sub_filter "https://cdn.kora-api.spac"    "https://yala.zaboni.store/__ext/cdn.kora-api.spac";

        # === Break ad-network URLs ===
        sub_filter "https://eruptpriority.com"  "https://blocked.invalid";
        sub_filter "//eruptpriority.com"        "//blocked.invalid";
        sub_filter "https://llvpn.com"          "https://blocked.invalid";
        sub_filter "//llvpn.com"                "//blocked.invalid";
        sub_filter "https://sansat.link"        "https://blocked.invalid";
        sub_filter "//sansat.link"              "//blocked.invalid";
        sub_filter "https://propellerads.com"   "https://blocked.invalid";
        sub_filter "https://propu.sh"           "https://blocked.invalid";
        sub_filter "https://onclickads"         "https://blocked.invalid";
        sub_filter "https://googlesyndication.com" "https://blocked.invalid";
        sub_filter "https://doubleclick.net"    "https://blocked.invalid";
        sub_filter "https://googleadservices.com" "https://blocked.invalid";
        sub_filter "//googlesyndication.com"    "//blocked.invalid";
        sub_filter "//doubleclick.net"          "//blocked.invalid";
        sub_filter "https://highperformanceformat.com" "https://blocked.invalid";
        sub_filter "https://groleegni.net"      "https://blocked.invalid";
        sub_filter "https://nessusresult.com"   "https://blocked.invalid";
        sub_filter "https://onmicroscopic.com"  "https://blocked.invalid";

        # === Brand rename: HesGoal / HesGoals → Alaboodi TV ===
        sub_filter "HesGoal TV" "Alaboodi TV";
        sub_filter "HesGoals TV" "Alaboodi TV";
        sub_filter "HesGoals Live" "Alaboodi TV";
        sub_filter "HesGoal Live" "Alaboodi TV";
        sub_filter "HesGoal Football" "Alaboodi TV";
        sub_filter "HesGoals Football" "Alaboodi TV";
        sub_filter "HesGoals" "Alaboodi TV";
        sub_filter "HesGoal" "Alaboodi TV";
        sub_filter "hesgoals" "alaboodi-tv";
        sub_filter "hesgoal" "alaboodi-tv";
        sub_filter "HESGOAL" "ALABOODI TV";
        sub_filter "HESGOALS" "ALABOODI TV";
        sub_filter "Hes Goal" "Alaboodi TV";
        sub_filter "Hes Goals" "Alaboodi TV";

        # === Inject styling + dark default + custom font + logo replace + footer ===
        sub_filter "<head>" "<head><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link rel=stylesheet href=https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap><style>/* Logo: replace nav-logo SVG with Alaboodi TV text */ .nav-logo,.nav-logo svg{display:none!important} .nav-brand{display:inline-flex!important;align-items:center!important;justify-content:center!important;height:36px!important;padding:0 14px!important;background:linear-gradient(135deg,#b91c1c 0%,#7f1d1d 100%)!important;border-radius:8px!important;text-decoration:none!important;box-shadow:0 2px 8px rgba(185,28,28,0.4)!important;font-size:0!important} .nav-brand>*{display:none!important} .nav-brand::before{content:'Alaboodi TV';font-family:'Poppins','Segoe UI','Helvetica Neue',sans-serif;font-size:16px;font-weight:700;color:#fff;letter-spacing:0.4px;line-height:1;display:block;direction:ltr;transform:translateY(2px)} /* Footer: hide content, inject custom credit */ footer[role=contentinfo] > *{display:none!important} footer[role=contentinfo]{display:block!important;text-align:center!important;padding:18px 12px!important;background:#1a1a1a!important;color:#fff!important} footer[role=contentinfo]::after{content:'جميع الحقوق محفوظة - مصطفى العبودي';display:block;font-size:14px;font-weight:600;color:#fff;letter-spacing:0.3px;direction:rtl} /* Hide overlay ads */ iframe[src*='ads'],iframe[src*='doubleclick'],iframe[src*='googlesyndication'],iframe[src*='eruptpriority'],iframe[src*='llvpn'],iframe[src*='sansat'],[id^='google_ads'],[class*='adsbygoogle'],ins.adsbygoogle,iframe[style*='z-index: 2147483647'],iframe[style*='z-index:2147483647']{display:none!important}</style>";

        sub_filter "</body>" "<script src=\"/__yala_wrap.js\" defer></script></body>";
    }

    location = /__yala_wrap.js {
        alias /var/www/yala.zaboni.store/__yala_wrap.js;
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    # Generic external proxy
    location ~ "^/__ext/([a-zA-Z0-9][-a-zA-Z0-9.]{0,253}\.[a-zA-Z]{2,24})(/.*)?$" {
        limit_req zone=yala_rl burst=80 nodelay;
        limit_conn yala_conn 30;

        set $ext_host $1;
        set $ext_path $2;
        if ($ext_path = "") { set $ext_path "/"; }

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $ext_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Referer "https://$ext_host$ext_path";
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";

        proxy_pass https://$ext_host$ext_path$is_args$args;
        proxy_ssl_server_name on;
        proxy_ssl_name $ext_host;
        proxy_ssl_verify off;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;
        proxy_hide_header X-Powered-By;

        proxy_cookie_domain ~^.*$ yala.zaboni.store;
        proxy_cookie_path / /;

        sub_filter_types text/html text/css text/plain text/xml application/javascript application/x-javascript application/json application/xml;
        sub_filter_once off;

        sub_filter ' target="_blank"' '';
        sub_filter ' target=_blank' '';

        # External URL rewrites
        sub_filter "https://hesgoal.football"  "https://yala.zaboni.store";
        sub_filter "//hesgoal.football"        "//yala.zaboni.store";
        sub_filter "https://xyzhesgoal-football.panel001.mov" "https://yala.zaboni.store/__ext/xyzhesgoal-football.panel001.mov";

        # Brand rename
        sub_filter "HesGoals TV" "Alaboodi TV";
        sub_filter "HesGoal TV" "Alaboodi TV";
        sub_filter "HesGoals" "Alaboodi TV";
        sub_filter "HesGoal" "Alaboodi TV";
        sub_filter "hesgoals" "alaboodi-tv";
        sub_filter "hesgoal" "alaboodi-tv";

        # Strip muted attr from video tags
        sub_filter ' muted ' ' ';
        sub_filter ' muted>' '>';
        sub_filter ' muted=""' '';
        sub_filter ' muted="muted"' '';

        # Break ad URLs
        sub_filter "https://eruptpriority.com"  "https://blocked.invalid";
        sub_filter "//eruptpriority.com"        "//blocked.invalid";
        sub_filter "https://llvpn.com"          "https://blocked.invalid";
        sub_filter "https://sansat.link"        "https://blocked.invalid";
        sub_filter "https://googlesyndication.com" "https://blocked.invalid";
        sub_filter "https://doubleclick.net"    "https://blocked.invalid";
        sub_filter "//googlesyndication.com"    "//blocked.invalid";
        sub_filter "//doubleclick.net"          "//blocked.invalid";

        sub_filter "</body>" "<script src=\"/__yala_wrap.js\" defer></script></body>";
        sub_filter "</head>" "<style>iframe[src*='ads'],iframe[src*='doubleclick'],iframe[src*='googlesyndication'],iframe[src*='eruptpriority'],iframe[src*='llvpn'],iframe[src*='sansat'],[id^='google_ads'],[class*='adsbygoogle'],ins.adsbygoogle,iframe[style*='z-index: 2147483647'],iframe[style*='z-index:2147483647'],.header-nav{display:none!important}</style></head>";
    }
}
