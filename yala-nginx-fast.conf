# Upstream pool with keepalive — reuses connections to upstream (huge speedup at scale)
upstream yalashoof_upstream {
    server www.yalashoof.com:443;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yala.zaboni.store;
    return 301 https://$host$request_uri;
}

# HTTPS reverse proxy — fast and hardened
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yala.zaboni.store;

    ssl_certificate /etc/letsencrypt/live/yala.zaboni.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yala.zaboni.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # (TLS session caching is already configured by certbot in options-ssl-nginx.conf)

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # === Gzip for client responses ===
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/html text/css text/plain text/xml text/javascript
        application/javascript application/x-javascript application/json
        application/xml application/rss+xml application/atom+xml
        image/svg+xml font/ttf font/otf;

    if ($is_bad_bot = 1) { return 403; }

    location ~ /\.(env|git|svn|hg|bzr|htaccess|htpasswd|DS_Store) { deny all; return 404; }
    location ~ /(wp-admin|wp-login|xmlrpc\.php|phpmyadmin|adminer)(/|$) { return 403; }
    location ~* \.(bak|backup|old|orig|sql|swp|swo|tmp|conf|config|log|ini|env)$ { deny all; return 404; }

    # === Buffers tuned for proxying ===
    proxy_buffer_size 32k;
    proxy_buffers 32 32k;
    proxy_busy_buffers_size 128k;
    proxy_max_temp_file_size 0;
    client_max_body_size 50M;
    client_body_buffer_size 64k;

    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Reasonable per-IP limits — protect upstream and origin
    limit_conn yala_conn 50;

    # === Static assets — cache aggressively, no rewriting needed ===
    location ~* \.(jpg|jpeg|png|gif|svg|webp|ico|woff|woff2|ttf|otf|eot)$ {
        proxy_pass https://yalashoof_upstream;
        proxy_set_header Host www.yalashoof.com;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;
        proxy_ssl_name www.yalashoof.com;
        proxy_ssl_verify off;

        proxy_cache yala_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status always;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # === Main location: HTML/CSS/JS proxying with rewriting + caching ===
    location / {
        limit_req zone=yala_rl burst=120 nodelay;

        proxy_pass https://yalashoof_upstream;
        proxy_set_header Host www.yalashoof.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Referer "https://www.yalashoof.com/";
        # Strip Accept-Encoding so upstream sends uncompressed (sub_filter requires)
        proxy_set_header Accept-Encoding "";

        proxy_ssl_server_name on;
        proxy_ssl_name www.yalashoof.com;
        proxy_ssl_verify off;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;

        # === Proxy cache for HTML — short TTL ===
        proxy_cache yala_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 30s;
        proxy_cache_valid 301 302 1m;
        proxy_cache_valid 404 30s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        add_header X-Cache-Status $upstream_cache_status always;

        proxy_redirect https://www.yalashoof.com/ https://yala.zaboni.store/;
        proxy_redirect https://yalashoof.com/  https://yala.zaboni.store/;
        proxy_redirect http://www.yalashoof.com/  https://yala.zaboni.store/;
        proxy_redirect http://yalashoof.com/   https://yala.zaboni.store/;

        proxy_cookie_domain www.yalashoof.com yala.zaboni.store;
        proxy_cookie_domain .www.yalashoof.com .yala.zaboni.store;
        proxy_cookie_domain yalashoof.com yala.zaboni.store;
        proxy_cookie_domain .yalashoof.com .yala.zaboni.store;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;
        proxy_hide_header X-Server-Powered-By;
        proxy_hide_header X-Powered-By;

        # === Sub-filter: rewrite all responses (HTML/CSS/JS/JSON/XML) ===
        sub_filter_types text/html text/css text/plain text/xml text/javascript application/javascript application/x-javascript application/json application/rss+xml application/atom+xml application/xml;
        sub_filter_once off;

        # URL rewrites
        sub_filter "https://www.yalashoof.com" "https://yala.zaboni.store";
        sub_filter "https://yalashoof.com"     "https://yala.zaboni.store";
        sub_filter "//www.yalashoof.com"       "//yala.zaboni.store";
        sub_filter "//yalashoof.com"           "//yala.zaboni.store";

        # Time zone
        sub_filter "بتوقيت الرياض" "بتوقيت محافظة ميسان العضيمة";

        # === Route known external streaming hosts through our /__ext/ proxy
        #     so ad blocking + brand rename apply there too ===
        sub_filter "https://al.frekora.live"  "https://yala.zaboni.store/__ext/al.frekora.live";
        sub_filter "https://frekora.live"     "https://yala.zaboni.store/__ext/frekora.live";
        sub_filter "//al.frekora.live"        "//yala.zaboni.store/__ext/al.frekora.live";
        sub_filter "//frekora.live"           "//yala.zaboni.store/__ext/frekora.live";
        sub_filter "https://al.korasimo.com"  "https://yala.zaboni.store/__ext/al.korasimo.com";
        sub_filter "https://www.korasimo.com" "https://yala.zaboni.store/__ext/www.korasimo.com";
        sub_filter "https://korasimo.com"     "https://yala.zaboni.store/__ext/korasimo.com";
        sub_filter "//korasimo.com"           "//yala.zaboni.store/__ext/korasimo.com";
        sub_filter "https://1.soccertvhd.live" "https://yala.zaboni.store/__ext/1.soccertvhd.live";
        sub_filter "https://soccertvhd.live"  "https://yala.zaboni.store/__ext/soccertvhd.live";
        sub_filter "//soccertvhd.live"        "//yala.zaboni.store/__ext/soccertvhd.live";
        sub_filter "//1.soccertvhd.live"      "//yala.zaboni.store/__ext/1.soccertvhd.live";

        # === Brand rename — comprehensive (longer phrases first) ===
        sub_filter "Yalla Shoot Live" "Alaboodi TV";
        sub_filter "yalla shoot live" "Alaboodi TV";
        sub_filter "YALLA SHOOT LIVE" "ALABOODI TV";
        sub_filter "Yalla shoot live" "Alaboodi TV";
        sub_filter "yalla Shoot Live" "Alaboodi TV";
        sub_filter "Yalla Shoot"      "Alaboodi TV";
        sub_filter "yalla shoot"      "Alaboodi TV";
        sub_filter "YALLA SHOOT"      "ALABOODI TV";
        sub_filter "Yalla shoot"      "Alaboodi TV";
        sub_filter "yalla Shoot"      "Alaboodi TV";
        sub_filter "Yallashoot Live"  "Alaboodi TV";
        sub_filter "yallashoot live"  "alaboodi-tv";
        sub_filter "Yallashoot"       "Alaboodi TV";
        sub_filter "yallashoot"       "alaboodi-tv";
        sub_filter "YALLASHOOT"       "ALABOODI-TV";
        sub_filter "yalla-shoot"      "alaboodi-tv";
        sub_filter "Yalla-Shoot"      "Alaboodi-TV";
        sub_filter "Yalla_Shoot"      "Alaboodi_TV";
        sub_filter "yalla_shoot"      "alaboodi_tv";
        sub_filter "يلا شوت لايف" "العبودي تي في";
        sub_filter "يلا شوت"        "العبودي تي في";
        sub_filter "يلاشوت"          "العبودي تي في";

        # === Inject styling + dark default + custom font in <head> ===
        sub_filter "<head>" "<head><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link rel=stylesheet href=https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap><script>try{var m=localStorage.getItem('mode');if(!m){localStorage.setItem('mode','rdmode');m='rdmode'}if(m==='rdmode')document.documentElement.classList.add('Night')}catch(e){}</script><style>a.aya-btn,a.aya-btn:hover,a.aya-btn:focus,a.aya-btn:active,a.aya-btn.active{transition:none!important;-webkit-tap-highlight-color:transparent!important}a.aya-btn[title*='الأمس'],a.aya-btn[title*='الأمس']:hover,a.aya-btn[title*='الأمس']:focus,a.aya-btn[title*='الأمس']:active{background:#0d9488!important;background-color:#0d9488!important;--btn-bg:#0d9488!important}a.aya-btn[title*='اليوم'],a.aya-btn[title*='اليوم']:hover,a.aya-btn[title*='اليوم']:focus,a.aya-btn[title*='اليوم']:active{background:#dc2626!important;background-color:#dc2626!important;--btn-bg:#dc2626!important}a.aya-btn[title*='الغد'],a.aya-btn[title*='الغد']:hover,a.aya-btn[title*='الغد']:focus,a.aya-btn[title*='الغد']:active{background:#7c3aed!important;background-color:#7c3aed!important;--btn-bg:#7c3aed!important}#AYaLogo,#AYaLogo *{background:transparent!important}#AYaLogo a,#AYaLogo a *{font-size:0!important;line-height:0!important;color:transparent!important}#AYaLogo a{background:linear-gradient(135deg,#b91c1c 0%,#7f1d1d 100%)!important;padding:0 14px!important;height:34px!important;border-radius:8px!important;display:inline-flex!important;align-items:center!important;justify-content:center!important;direction:ltr!important;text-decoration:none!important;box-shadow:0 2px 8px rgba(185,28,28,0.4)!important;vertical-align:middle!important;line-height:1!important}#AYaLogo a::before{content:'Alaboodi TV';font-family:'Poppins','Segoe UI','Helvetica Neue',sans-serif;font-size:14px;font-weight:700;color:#fff;letter-spacing:0.4px;line-height:1!important;display:block;direction:ltr;text-transform:none;margin:0!important;padding:0!important;transform:translateY(2px)!important}#AYaFooter > *:not(#__yala_credit){display:none!important}.AY_Block.PS_1{display:none!important}#AYaFooter{padding:18px 12px!important;text-align:center!important;background:#1a1a1a!important;color:#fff!important}</style>";

        # Inject body-end script
        sub_filter "</body>" "<script src=\"/__yala_wrap.js\" defer></script></body>";
    }

    location = /__yala_wrap.js {
        alias /var/www/yala.zaboni.store/__yala_wrap.js;
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    # ============================================================
    # Generic external-host proxy (any site linked from yalashoof gets
    # the same ad/popup blocking). Rate-limited and bad-bot blocked.
    # Path: /__ext/<host>/<path>  →  https://<host>/<path>
    # ============================================================
    location ~ "^/__ext/([a-zA-Z0-9][-a-zA-Z0-9.]{0,253}\.[a-zA-Z]{2,24})(/.*)?$" {
        # Hard rate limit on the open proxy (even with whitelist removed)
        limit_req zone=yala_rl burst=80 nodelay;
        limit_conn yala_conn 30;

        set $ext_host $1;
        set $ext_path $2;

        # Default to root path if none given
        if ($ext_path = "") { set $ext_path "/"; }

        # Same security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $ext_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Referer "https://$ext_host$ext_path";
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";

        proxy_pass https://$ext_host$ext_path$is_args$args;
        proxy_ssl_server_name on;
        proxy_ssl_name $ext_host;
        proxy_ssl_verify off;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;
        proxy_hide_header X-Powered-By;

        # Rewrite cookies to our domain
        proxy_cookie_domain ~^.*$ yala.zaboni.store;
        proxy_cookie_path / /;

        # Rewrite redirects
        proxy_redirect ~^https?://(al\.)?frekora\.live(/.*)?$  https://yala.zaboni.store/__ext/al.frekora.live$2;
        proxy_redirect ~^https?://(al\.|www\.)?korasimo\.com(/.*)?$ https://yala.zaboni.store/__ext/korasimo.com$2;

        # Rewrite all known external URLs in served content so navigation stays inside our proxy
        sub_filter_types text/html text/css text/plain text/xml application/javascript application/x-javascript application/json application/xml;
        sub_filter_once off;
        sub_filter "https://al.frekora.live"      "https://yala.zaboni.store/__ext/al.frekora.live";
        sub_filter "https://frekora.live"          "https://yala.zaboni.store/__ext/frekora.live";
        sub_filter "//al.frekora.live"             "//yala.zaboni.store/__ext/al.frekora.live";
        sub_filter "//frekora.live"                "//yala.zaboni.store/__ext/frekora.live";
        sub_filter "https://al.korasimo.com"       "https://yala.zaboni.store/__ext/al.korasimo.com";
        sub_filter "https://www.korasimo.com"      "https://yala.zaboni.store/__ext/www.korasimo.com";
        sub_filter "https://korasimo.com"          "https://yala.zaboni.store/__ext/korasimo.com";
        sub_filter "//korasimo.com"                "//yala.zaboni.store/__ext/korasimo.com";
        sub_filter "https://1.soccertvhd.live"     "https://yala.zaboni.store/__ext/1.soccertvhd.live";
        sub_filter "https://soccertvhd.live"       "https://yala.zaboni.store/__ext/soccertvhd.live";
        sub_filter "//soccertvhd.live"             "//yala.zaboni.store/__ext/soccertvhd.live";
        sub_filter "//1.soccertvhd.live"           "//yala.zaboni.store/__ext/1.soccertvhd.live";

        # Apply same external-host rewrites in the /__ext/ location too,
        # so chained navigation (frekora → soccertvhd, etc.) stays in our proxy.

        # Brand rename also here
        sub_filter "Yalla Shoot Live" "Alaboodi TV";
        sub_filter "yalla shoot live" "Alaboodi TV";
        sub_filter "Yalla Shoot"      "Alaboodi TV";
        sub_filter "yalla shoot"      "Alaboodi TV";
        sub_filter "yallashoot"       "alaboodi-tv";
        sub_filter "Yallashoot"       "Alaboodi TV";
        sub_filter "يلا شوت"        "العبودي تي في";
        sub_filter "Korasimo"         "Alaboodi TV";
        sub_filter "korasimo"         "alaboodi-tv";
        sub_filter "KORASIMO"         "ALABOODI TV";
        sub_filter "kkoora"           "Alaboodi TV";

        # === Break ad-network URLs entirely — any reference to these domains
        # becomes a 404 on a non-existent host, killing scripts/iframes/XHR ===
        sub_filter "https://eruptpriority.com"  "https://blocked.invalid";
        sub_filter "//eruptpriority.com"        "//blocked.invalid";
        sub_filter "https://llvpn.com"          "https://blocked.invalid";
        sub_filter "//llvpn.com"                "//blocked.invalid";
        sub_filter "https://sansat.link"        "https://blocked.invalid";
        sub_filter "//sansat.link"              "//blocked.invalid";
        sub_filter "https://propellerads.com"   "https://blocked.invalid";
        sub_filter "https://propu.sh"           "https://blocked.invalid";
        sub_filter "https://onclickads"         "https://blocked.invalid";
        sub_filter "https://googlesyndication.com" "https://blocked.invalid";
        sub_filter "https://doubleclick.net"    "https://blocked.invalid";
        sub_filter "https://googleadservices.com" "https://blocked.invalid";
        sub_filter "//googlesyndication.com"    "//blocked.invalid";
        sub_filter "//doubleclick.net"          "//blocked.invalid";
        sub_filter "https://highperformanceformat.com" "https://blocked.invalid";
        sub_filter "https://groleegni.net"      "https://blocked.invalid";
        sub_filter "https://nessusresult.com"   "https://blocked.invalid";
        sub_filter "https://onmicroscopic.com"  "https://blocked.invalid";
        sub_filter "https://datsbrowngutter.com" "https://blocked.invalid";
        sub_filter "https://tropicalmotor.com"  "https://blocked.invalid";
        sub_filter "https://horizonmovecal.com" "https://blocked.invalid";
        sub_filter "https://mainnewsplate.com"  "https://blocked.invalid";
        sub_filter "https://contentwidget.com"  "https://blocked.invalid";

        # Inject the same ad-blocking JS so popups/popunders are killed
        sub_filter "</body>" "<script src=\"/__yala_wrap.js\" defer></script></body>";
        sub_filter "</head>" "<style>iframe[src*='ads'],iframe[src*='doubleclick'],iframe[src*='googlesyndication'],iframe[src*='eruptpriority'],iframe[src*='llvpn'],iframe[src*='sansat'],[id^='google_ads'],[class*='adsbygoogle'],ins.adsbygoogle,iframe[style*='z-index: 2147483647'],iframe[style*='z-index:2147483647'],.header-nav{display:none!important}</style></head>";
    }
}
