  (top-level navigation / fullscreen video suspension). Always reverse-proxy instead.
-->
<meta http-equiv="refresh" content="0; url=https://yala.zaboni.store/">
<link rel="canonical" href="https://yala.zaboni.store/">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  (function () {
    var DEST = "https://yala.zaboni.store/";
    var tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      try { tg.ready(); } catch (_) {}
      try { tg.expand(); } catch (_) {}
    }
    location.replace(DEST);
  })();
</script>
